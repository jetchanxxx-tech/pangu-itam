version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_MODE=release
      - DATABASE_DRIVER=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=itam
      - DATABASE_PASSWORD=itam_password
      - DATABASE_DBNAME=itam
    depends_on:
      - postgres
      - redis
    volumes:
      - ./uploads:/root/uploads
      - ./configs:/root/configs
    networks:
      - itam-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: itam
      POSTGRES_PASSWORD: itam_password
      POSTGRES_DB: itam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - itam-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - itam-network

volumes:
  postgres_data:

networks:
  itam-network:
    driver: bridge
